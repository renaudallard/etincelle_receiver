<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Etincelle Receiver</title>
    <!-- Official Receiver: https://chromecast.cloud-01.molotov.tv/ -->
    <!-- Google does not offer a pinned CDN path; v3 is a rolling channel -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        cast-media-player {
            --advancement-background-color: rgba(0,0,0,0.8);
        }

        /* Control Menu Overlay */
        #control-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 40px 20px 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            z-index: 1000;
        }
        #control-menu.visible {
            transform: translateY(0);
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 25px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
        }
        .menu-item.selected {
            background: rgba(229, 9, 20, 0.9);
            transform: scale(1.1);
        }
        .menu-item .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .menu-item .label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Track submenu (audio / subtitles) */
        #track-submenu {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.95);
            border-radius: 8px;
            padding: 10px 0;
            min-width: 200px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1001;
        }
        #track-submenu.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .track-option {
            padding: 12px 20px;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
        }
        .track-option.selected {
            background: rgba(229, 9, 20, 0.9);
        }
        .track-option.active::after {
            content: ' ✓';
            color: #4CAF50;
        }

        /* Hint overlay */
        #menu-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #menu-hint.visible {
            opacity: 1;
        }

        /* Seek preview overlay */
        #seek-preview {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            padding: 14px 22px;
            min-width: 320px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1002;
            font-family: 'Roboto', sans-serif;
        }
        #seek-preview.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #seek-preview-label {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
        }
        #seek-preview-delta {
            color: #e50914;
            font-weight: bold;
        }
        #seek-preview-track {
            height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            overflow: hidden;
        }
        #seek-preview-fill {
            height: 100%;
            width: 0%;
            background: #e50914;
            transition: width 0.1s linear;
        }

        /* Transient notice (errors, empty track lists) */
        #notice {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 80%;
            background: rgba(0,0,0,0.9);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            text-align: center;
            padding: 14px 24px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 2000;
        }
        #notice.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>

    <!-- Control Menu -->
    <div id="control-menu">
        <div class="menu-item" data-action="back">
            <span class="icon">⏪</span>
            <span class="label">-10s</span>
        </div>
        <div class="menu-item" data-action="forward">
            <span class="icon">⏩</span>
            <span class="label">+30s</span>
        </div>
        <div class="menu-item" data-action="restart">
            <span class="icon">↺</span>
            <span class="label">Restart</span>
        </div>
        <div class="menu-item" data-action="audio">
            <span class="icon">🔊</span>
            <span class="label">Audio</span>
        </div>
        <div class="menu-item" data-action="subtitles">
            <span class="icon">💬</span>
            <span class="label">Subtitles</span>
        </div>
    </div>

    <!-- Track Submenu (audio / subtitles) -->
    <div id="track-submenu"></div>

    <!-- Menu Hint -->
    <div id="menu-hint">Press ↓ for controls</div>

    <!-- Transient notice -->
    <div id="notice"></div>

    <!-- Seek Preview -->
    <div id="seek-preview">
        <div id="seek-preview-label">
            <span id="seek-preview-time">0:00</span>
            <span id="seek-preview-delta"></span>
        </div>
        <div id="seek-preview-track">
            <div id="seek-preview-fill"></div>
        </div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // Menu State
        let menuVisible = false;
        let trackMenuVisible = false;
        let trackMenuType = null;        // 'AUDIO' or 'TEXT' while the submenu is open
        let selectedIndex = 0;
        let trackSelectedIndex = 0;
        let menuItems = [];
        let trackOptions = [];           // [{ trackId, label, language }] for the open submenu
        let hideHintTimer = null;
        let hideMenuTimer = null;
        // Set when the user picks an audio track; stops the auto French override.
        // userAudioTrackId / userAudioLanguage remember the choice so it survives an
        // auto-reconnect, which reloads the same stream from its default audio again.
        let userSelectedAudio = false;
        let userAudioLanguage = null;
        let userAudioTrackId = null;
        // Set once the control hint has been shown, so it appears only on the
        // first load and not on every channel change.
        let hintShown = false;

        // Self-recovery state. lastLoadRequest is the resolved request cached
        // from the interceptor so a failed stream can be reloaded by itself.
        const RECONNECT_BASE_DELAY = 2000;
        const RECONNECT_MAX_DELAY = 30000;
        let lastLoadRequest = null;
        let reconnectAttempts = 0;
        let reconnectTimer = null;
        let recovering = false;
        // Set when the user stops or exits from the remote (STOP command or back/exit). It keeps the
        // self-reconnect from healing playback back up, so a stop stops instead of restarting. Reset on
        // the next genuine LOAD (a fresh cast).
        let userStopped = false;

        // Stall watchdog: a hung segment download can sit in BUFFERING forever
        // without firing an error, so reload when the media clock stops
        // advancing while playback should be progressing.
        const STALL_CHECK_INTERVAL = 5000;
        const STALL_TIMEOUT = 15000;
        // -1 is a value the media clock never reports, so the first observation
        // always re-baselines instead of looking like a stall.
        let lastMediaTime = -1;
        let stalledFor = 0;

        // Continue-watching: the receiver POSTs the playback position to the Fubo playhead while
        // casting, because the phone is not reliably present during a cast session. All of these are
        // populated from the LOAD customData; they stay null (no reporting) when it is absent.
        const PLAYHEAD_INTERVAL = 10000;
        let playheadUrl = null;
        let playheadPayload = null;
        let playheadHeaders = null;
        let playheadDurationSec = 0;
        let playheadLastSent = -1;
        let playheadTimer = null;
        let playheadInflight = false;

        // Seek state
        const SEEK_STEP_BACK = -10;
        const SEEK_STEP_FWD = 30;
        const SEEK_COMMIT_DELAY = 400;
        const SEEK_PREVIEW_LINGER = 800;
        // Holding the key auto-repeats keydown; each repeat in the same direction
        // grows the step, so a held button scrubs faster the longer it is held
        // (capped). Distinct taps do not accelerate.
        const SEEK_ACCEL_STEP = 0.6;
        const SEEK_MAX_MULTIPLIER = 12;
        let pendingSeekTime = null;
        let seekCommitTimer = null;
        let hideSeekPreviewTimer = null;
        let seekRepeat = 0;
        let seekDir = 0;

        // DOM Elements
        const controlMenu = document.getElementById('control-menu');
        const trackSubmenu = document.getElementById('track-submenu');
        const menuHint = document.getElementById('menu-hint');
        const seekPreview = document.getElementById('seek-preview');
        const seekPreviewTime = document.getElementById('seek-preview-time');
        const seekPreviewDelta = document.getElementById('seek-preview-delta');
        const seekPreviewTrack = document.getElementById('seek-preview-track');
        const seekPreviewFill = document.getElementById('seek-preview-fill');
        const notice = document.getElementById('notice');

        // Transient Notice
        // The receiver otherwise fails to a black screen with no indication of
        // what went wrong, so surface playback errors and similar conditions.
        let hideNoticeTimer = null;
        function showNotice(message) {
            notice.textContent = message;
            notice.classList.add('visible');
            clearTimeout(hideNoticeTimer);
            clearTimeout(hideHintTimer);
            menuHint.classList.remove('visible');
            hideNoticeTimer = setTimeout(() => {
                notice.classList.remove('visible');
            }, 6000);
        }

        // Initialize Menu Items
        function initMenu() {
            menuItems = document.querySelectorAll('.menu-item');
            updateMenuSelection();
        }

        // Menu Visibility
        function showMenu() {
            menuVisible = true;
            controlMenu.classList.add('visible');
            menuHint.classList.remove('visible');
            resetHideMenuTimer();
        }

        function hideMenu() {
            menuVisible = false;
            trackMenuVisible = false;
            controlMenu.classList.remove('visible');
            trackSubmenu.classList.remove('visible');
            clearTimeout(hideMenuTimer);
        }

        function resetHideMenuTimer() {
            clearTimeout(hideMenuTimer);
            hideMenuTimer = setTimeout(() => {
                // hideMenu() closes the track submenu too, so an idle timeout
                // dismisses the whole overlay whether or not the submenu is open.
                if (menuVisible) {
                    hideMenu();
                }
            }, 5000);
        }

        // Menu Navigation
        function updateMenuSelection() {
            menuItems.forEach((item, index) => {
                item.classList.toggle('selected', index === selectedIndex);
            });
        }

        function navigateMenu(direction) {
            if (!menuVisible) return;
            resetHideMenuTimer();

            selectedIndex += direction;
            if (selectedIndex < 0) selectedIndex = menuItems.length - 1;
            if (selectedIndex >= menuItems.length) selectedIndex = 0;
            updateMenuSelection();
        }

        function activateMenuItem() {
            if (!menuVisible) return;
            resetHideMenuTimer();

            if (trackMenuVisible) {
                selectTrack();
                return;
            }

            const action = menuItems[selectedIndex].dataset.action;
            executeAction(action);
        }

        // Actions
        function executeAction(action) {
            const currentTime = playerManager.getCurrentTimeSec();

            switch (action) {
                case 'back':
                    clampedSeek(currentTime + SEEK_STEP_BACK);
                    break;
                case 'forward':
                    clampedSeek(currentTime + SEEK_STEP_FWD);
                    break;
                case 'restart':
                    clampedSeek(0);
                    break;
                case 'audio':
                    if (!showTrackMenu('AUDIO')) showNotice('No audio tracks available');
                    return; // Don't hide menu
                case 'subtitles':
                    if (!showTrackMenu('TEXT')) showNotice('No subtitles available');
                    return; // Don't hide menu
            }

            // Brief feedback then hide
            setTimeout(hideMenu, 500);
        }

        // Seek Controls
        // Returns the seekable bounds {min, max} for the current media, or null
        // when nothing is loaded or a live stream exposes no timeshift window.
        // max is null when the upper bound is unknown (VOD without a duration).
        function getSeekBounds() {
            const mediaInfo = playerManager.getMediaInformation();
            if (!mediaInfo) return null;

            const messages = cast.framework.messages;
            if (mediaInfo.streamType === messages.StreamType.LIVE) {
                const range = playerManager.getLiveSeekableRange();
                if (range && Number.isFinite(range.start)
                    && Number.isFinite(range.end) && range.end > range.start) {
                    return { min: range.start, max: range.end };
                }
                // Live stream without a usable seekable window: seeking not possible.
                return null;
            }

            const dur = playerManager.getDurationSec();
            if (!Number.isNaN(dur) && dur > 0) {
                return { min: 0, max: dur };
            }
            // VOD with unknown duration: clamp only at the start.
            return { min: 0, max: null };
        }

        function clampBounds(value, bounds) {
            let t = value;
            // A non-finite target (e.g. a seek attempted before the media clock is
            // ready) slips through the comparisons below unclamped, so pin it to the
            // lower bound rather than forwarding NaN to seek().
            if (!Number.isFinite(t)) return bounds.min;
            if (t < bounds.min) t = bounds.min;
            if (bounds.max !== null && t > bounds.max) t = bounds.max;
            return t;
        }

        // Absolute seek in seconds, clamped to the current media bounds.
        function clampedSeek(target) {
            const bounds = getSeekBounds();
            if (!bounds) return;
            playerManager.seek(clampBounds(target, bounds));
        }

        function formatTime(totalSec) {
            if (!Number.isFinite(totalSec) || totalSec < 0) totalSec = 0;
            totalSec = Math.floor(totalSec);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const mm = (h > 0 && m < 10) ? '0' + m : '' + m;
            const ss = s < 10 ? '0' + s : '' + s;
            return h > 0 ? (h + ':' + mm + ':' + ss) : (mm + ':' + ss);
        }

        function formatDelta(deltaSec) {
            const sign = deltaSec < 0 ? '-' : '+';
            return sign + formatTime(Math.abs(deltaSec));
        }

        function renderSeekPreview(target, bounds, speed) {
            const current = playerManager.getCurrentTimeSec();
            // Only show the jump size when the current position is known; a NaN clock
            // would otherwise render a misleading +0:00 beside a valid target time.
            let deltaText = Number.isFinite(current)
                ? formatDelta(Math.round(target - current))
                : '';
            if (speed && speed >= 2) {
                deltaText += '  ×' + Math.round(speed);
            }
            seekPreviewTime.textContent = formatTime(target);
            seekPreviewDelta.textContent = deltaText;

            if (bounds.max !== null && bounds.max > bounds.min) {
                const frac = (target - bounds.min) / (bounds.max - bounds.min);
                seekPreviewFill.style.width =
                    (Math.max(0, Math.min(1, frac)) * 100) + '%';
                seekPreviewTrack.style.visibility = 'visible';
            } else {
                seekPreviewTrack.style.visibility = 'hidden';
            }
        }

        function showSeekPreview() {
            clearTimeout(hideSeekPreviewTimer);
            seekPreview.classList.add('visible');
        }

        function hideSeekPreview() {
            seekPreview.classList.remove('visible');
        }

        // Accumulate a relative seek and arm the debounce timer. Repeated key
        // presses build up a single target so the stream is only seeked once.
        function stepSeek(deltaSec, isRepeat) {
            if (menuVisible || trackMenuVisible) return;

            const bounds = getSeekBounds();
            if (!bounds) return;

            // Accelerate only while the button is genuinely held (key auto-repeat):
            // count consecutive repeats in the same direction and grow the step, so
            // distinct deliberate taps each start at the base step rather than
            // compounding into an oversized jump.
            const direction = deltaSec < 0 ? -1 : 1;
            if (isRepeat && direction === seekDir) {
                seekRepeat++;
            } else {
                seekRepeat = 0;
            }
            seekDir = direction;

            const multiplier = Math.min(
                SEEK_MAX_MULTIPLIER, 1 + seekRepeat * SEEK_ACCEL_STEP
            );

            const base = (pendingSeekTime !== null)
                ? pendingSeekTime
                : playerManager.getCurrentTimeSec();
            pendingSeekTime = clampBounds(base + deltaSec * multiplier, bounds);

            renderSeekPreview(pendingSeekTime, bounds, multiplier);
            showSeekPreview();

            clearTimeout(seekCommitTimer);
            seekCommitTimer = setTimeout(commitSeek, SEEK_COMMIT_DELAY);
        }

        // Issue the accumulated seek as a single clamped seek operation.
        function doSeekCommit() {
            clearTimeout(seekCommitTimer);
            seekCommitTimer = null;
            seekRepeat = 0;
            seekDir = 0;
            if (pendingSeekTime !== null) {
                clampedSeek(pendingSeekTime);
                pendingSeekTime = null;
            }
        }

        function commitSeek() {
            doSeekCommit();
            // Keep the preview briefly so the landing point stays visible.
            clearTimeout(hideSeekPreviewTimer);
            hideSeekPreviewTimer = setTimeout(hideSeekPreview, SEEK_PREVIEW_LINGER);
        }

        // Commit any pending seek immediately and clear the preview, used when
        // the control menu takes over the LEFT/RIGHT keys.
        function flushPendingSeek() {
            doSeekCommit();
            hideSeekPreview();
        }

        // Discard any pending seek without committing it, used when the media is
        // replaced so a stale target cannot seek the new stream.
        function cancelPendingSeek() {
            clearTimeout(seekCommitTimer);
            seekCommitTimer = null;
            clearTimeout(hideSeekPreviewTimer);
            seekRepeat = 0;
            seekDir = 0;
            pendingSeekTime = null;
            hideSeekPreview();
        }

        // Audio and subtitles are handled by separate CAF track managers: the
        // audio manager exposes a single active track, the text manager a set.
        // These helpers present both through a common shape so the menu code
        // stays uniform.
        function tracksManagerOfType(type) {
            return type === 'AUDIO'
                ? playerManager.getAudioTracksManager()
                : playerManager.getTextTracksManager();
        }

        // Tracks of `type` ('AUDIO' or 'TEXT'), or [] when none are loaded yet.
        // The managers throw if queried before media is ready, hence the guard.
        function tracksOfType(type) {
            try {
                return tracksManagerOfType(type).getTracks() || [];
            } catch (e) {
                return [];
            }
        }

        // Active track ids for `type`, always an array (audio has at most one).
        function activeTrackIdsOfType(type) {
            try {
                if (type === 'AUDIO') {
                    const id = playerManager.getAudioTracksManager().getActiveId();
                    return (id === null || id === undefined) ? [] : [id];
                }
                return playerManager.getTextTracksManager().getActiveIds() || [];
            } catch (e) {
                return [];
            }
        }

        // Make `trackId` the active track of `type` (null to turn subtitles
        // off). The two managers are independent, so changing the audio track
        // never disturbs the active subtitle track or vice versa.
        function setActiveTrackOfType(type, trackId) {
            if (type === 'AUDIO') {
                if (trackId === null || trackId === undefined) return;
                playerManager.getAudioTracksManager().setActiveById(trackId);
            } else {
                const ids = (trackId === null || trackId === undefined)
                    ? [] : [trackId];
                playerManager.getTextTracksManager().setActiveByIds(ids);
            }
        }

        // Track Submenu (audio / subtitles)
        const LANG_NAMES = {
            'fr': 'Français', 'fra': 'Français', 'fre': 'Français',
            'en': 'English', 'eng': 'English',
            'de': 'Deutsch', 'deu': 'Deutsch', 'ger': 'Deutsch',
            'es': 'Español', 'spa': 'Español',
            'it': 'Italiano', 'ita': 'Italiano',
            'qaa': 'Original'
        };

        // ISO-639 tags the same language with 2- and 3-letter (and bibliographic vs
        // terminologic) variants; fold them so an API preference of 'fr' matches a
        // track tagged 'fra'/'fre' and vice versa.
        const LANG_ALIASES = {
            'fr': 'fr', 'fra': 'fr', 'fre': 'fr',
            'en': 'en', 'eng': 'en',
            'de': 'de', 'deu': 'de', 'ger': 'de',
            'es': 'es', 'spa': 'es',
            'it': 'it', 'ita': 'it'
        };
        function canonicalLang(code) {
            if (!code) return code;
            const c = code.toLowerCase();
            return LANG_ALIASES[c] || c;
        }

        function trackLabel(track, index) {
            if (track.language) {
                return LANG_NAMES[track.language] || track.language.toUpperCase();
            }
            return track.name || 'Track ' + (index + 1);
        }

        // Open the submenu for the given track type ('AUDIO' or 'TEXT'). Text
        // tracks also get an "Off" entry. Returns false without opening when
        // there is no track of that type to choose from.
        function showTrackMenu(type) {
            const typeTracks = tracksOfType(type);
            if (typeTracks.length === 0) return false;

            const activeIds = activeTrackIdsOfType(type);

            trackMenuType = type;
            trackSelectedIndex = 0;
            trackOptions = [];
            // Subtitles can be turned off; audio always plays one track.
            if (type === 'TEXT') trackOptions.push({ trackId: null, label: 'Off' });
            typeTracks.forEach((track, index) => {
                trackOptions.push({
                    trackId: track.trackId,
                    label: trackLabel(track, index),
                    language: track.language || null
                });
            });

            const anyActive = typeTracks.some(t => activeIds.includes(t.trackId));
            trackSubmenu.innerHTML = '';
            trackOptions.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'track-option';
                div.textContent = option.label;

                const isActive = (option.trackId === null)
                    ? !anyActive
                    : activeIds.includes(option.trackId);
                if (isActive) {
                    div.classList.add('active');
                    trackSelectedIndex = index;
                }

                trackSubmenu.appendChild(div);
            });

            trackMenuVisible = true;
            trackSubmenu.classList.add('visible');
            updateTrackSelection();
            // Arm the idle auto-hide for the submenu too, so it does not sit on
            // screen indefinitely when left open.
            resetHideMenuTimer();
            return true;
        }

        function hideTrackMenu() {
            trackMenuVisible = false;
            trackSubmenu.classList.remove('visible');
            // Back on the main menu, so restart its idle auto-hide countdown.
            resetHideMenuTimer();
        }

        function navigateTrackMenu(direction) {
            resetHideMenuTimer();
            trackSelectedIndex += direction;
            if (trackSelectedIndex < 0) trackSelectedIndex = trackOptions.length - 1;
            if (trackSelectedIndex >= trackOptions.length) trackSelectedIndex = 0;
            updateTrackSelection();
        }

        function updateTrackSelection() {
            const options = trackSubmenu.querySelectorAll('.track-option');
            options.forEach((opt, index) => {
                opt.classList.toggle('selected', index === trackSelectedIndex);
            });
        }

        function selectTrack() {
            const option = trackOptions[trackSelectedIndex];
            if (option) {
                setActiveTrackOfType(trackMenuType, option.trackId);
                if (trackMenuType === 'AUDIO') {
                    userSelectedAudio = true;
                    userAudioLanguage = option.language;
                    userAudioTrackId = option.trackId;
                }
                console.log('[Etincelle] ' + trackMenuType
                    + ' track changed to:', option.trackId);
            }
            hideTrackMenu();
            setTimeout(hideMenu, 500);
        }

        // Key Event Handling
        // Cast remotes dispatch KeyboardEvent.key ('ArrowLeft', 'BrowserBack',
        // ...); older webviews only populate the legacy keyCode. Accept both.
        function normalizeKey(event) {
            switch (event.key) {
                case 'ArrowUp': return 'up';
                case 'ArrowDown': return 'down';
                case 'ArrowLeft': return 'left';
                case 'ArrowRight': return 'right';
                case 'Enter': return 'enter';
                case 'Back':
                case 'BrowserBack':
                case 'GoBack':
                case 'Escape':
                    return 'back';
            }
            switch (event.keyCode) {
                case 38: return 'up';
                case 40: return 'down';
                case 37: return 'left';
                case 39: return 'right';
                case 13: return 'enter';
                case 8:
                case 27:
                    return 'back';
            }
            return null;
        }

        function handleKeyDown(event) {
            const action = normalizeKey(event);
            if (!action) return;

            switch (action) {
                case 'down':
                    if (!menuVisible) {
                        flushPendingSeek();
                        showMenu();
                    } else if (trackMenuVisible) {
                        navigateTrackMenu(1);
                    }
                    event.preventDefault();
                    break;

                case 'up':
                    if (trackMenuVisible) {
                        navigateTrackMenu(-1);
                    } else if (menuVisible) {
                        hideMenu();
                    }
                    event.preventDefault();
                    break;

                case 'left':
                    if (menuVisible && !trackMenuVisible) {
                        navigateMenu(-1);
                    } else if (!menuVisible) {
                        stepSeek(SEEK_STEP_BACK, event.repeat);
                    }
                    event.preventDefault();
                    break;

                case 'right':
                    if (menuVisible && !trackMenuVisible) {
                        navigateMenu(1);
                    } else if (!menuVisible) {
                        stepSeek(SEEK_STEP_FWD, event.repeat);
                    }
                    event.preventDefault();
                    break;

                case 'enter':
                    if (menuVisible) {
                        activateMenuItem();
                    } else {
                        flushPendingSeek();
                        showMenu();
                    }
                    event.preventDefault();
                    break;

                case 'back':
                    if (trackMenuVisible) {
                        hideTrackMenu();
                        event.preventDefault();
                    } else if (menuVisible) {
                        hideMenu();
                        event.preventDefault();
                    } else {
                        // No menu open: back/exit ends the cast instead of being swallowed.
                        stopCasting();
                    }
                    break;
            }
        }

        document.addEventListener('keydown', handleKeyDown);

        // Track Selection Logic
        // Re-select the user's chosen audio track after a reload (auto-reconnect).
        // Matches by trackId first, then by language, so a track with no language
        // code is still restored and same-language duplicates are not confused.
        function reapplyUserAudio() {
            const audioTracksLocal = tracksOfType('AUDIO');
            if (audioTracksLocal.length === 0) return;
            const activeIds = activeTrackIdsOfType('AUDIO');
            let target = (userAudioTrackId !== null && userAudioTrackId !== undefined)
                ? audioTracksLocal.find(t => t.trackId === userAudioTrackId)
                : null;
            if (!target && userAudioLanguage) {
                target = audioTracksLocal.find(t => t.language === userAudioLanguage);
            }
            if (target && !activeIds.includes(target.trackId)) {
                setActiveTrackOfType('AUDIO', target.trackId);
            }
        }

        function forceFrenchAudio() {
            // Respect a manual audio choice instead of forcing French back on. After
            // an auto-reconnect the chosen track must be re-applied, since the reload
            // starts the stream from its default audio again.
            if (userSelectedAudio) {
                reapplyUserAudio();
                return;
            }

            const audioTracksLocal = tracksOfType('AUDIO');
            if (audioTracksLocal.length === 0) return;
            const activeIds = activeTrackIdsOfType('AUDIO');

            // 1. Check for explicit preference from Molotov API (passed via customData)
            const mediaInfo = playerManager.getMediaInformation();
            const customData = mediaInfo ? mediaInfo.customData : null;

            if (customData && customData.selected_track && customData.selected_track.track_audio) {
                const prefLang = customData.selected_track.track_audio;
                const prefTrack = audioTracksLocal.find(
                    t => canonicalLang(t.language) === canonicalLang(prefLang));
                if (prefTrack) {
                    if (!activeIds.includes(prefTrack.trackId)) {
                        console.log("[Etincelle] Switching to API preference:", prefLang);
                        setActiveTrackOfType('AUDIO', prefTrack.trackId);
                    }
                    return;
                }
            }

            // 2. Fallback: If current track is English/Original, look for French
            const activeTrack = audioTracksLocal.find(t => activeIds.includes(t.trackId));
            const activeLang = activeTrack ? activeTrack.language : 'unknown';

            if (activeLang === 'en' || activeLang === 'eng' || activeLang === 'qaa' || activeLang === 'unknown') {
                const target = audioTracksLocal.find(t =>
                    t.language === 'fr' ||
                    t.language === 'fra' ||
                    t.language === 'fre' ||
                    (t.name && t.name.toLowerCase().includes('franç'))
                ) || audioTracksLocal.find(t => t.language !== 'en' && t.language !== 'eng' && t.language !== 'qaa');

                if (target && !activeIds.includes(target.trackId)) {
                    console.log("[Etincelle] Fallback switch to:", target.language);
                    setActiveTrackOfType('AUDIO', target.trackId);
                }
            }
        }

        // Reload the last stream after a failure, doubling the delay between
        // attempts up to a cap so a broken backend is not hammered. It keeps
        // retrying, so the receiver heals itself once the network or backend
        // recovers. The recovering guard stops a burst of errors from stacking
        // several reloads on top of each other.
        function triggerReconnect() {
            if (!lastLoadRequest || recovering || userStopped) return;
            recovering = true;

            // Resume VOD where playback was instead of restarting from the
            // original offset cached at load time. Live reloads at the edge, so
            // leave its start time untouched.
            const mediaInfo = playerManager.getMediaInformation();
            if (mediaInfo && mediaInfo.streamType
                    !== cast.framework.messages.StreamType.LIVE) {
                const pos = playerManager.getCurrentTimeSec();
                if (Number.isFinite(pos) && pos > 0) {
                    lastLoadRequest.currentTime = pos;
                }
            }

            const delay = Math.min(
                RECONNECT_MAX_DELAY,
                RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts)
            );
            reconnectAttempts++;
            showNotice('Connection lost, reconnecting...');
            reconnectTimer = setTimeout(() => {
                console.log('[Etincelle] Reconnect attempt', reconnectAttempts);
                playerManager.load(lastLoadRequest)
                    .then(() => { recovering = false; })
                    .catch(e => {
                        console.error('[Etincelle] Reconnect failed:', e);
                        recovering = false;
                        triggerReconnect();
                    });
            }, delay);
        }

        // Playback resumed, so clear the backoff for the next failure.
        function recoveryDone() {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
            reconnectAttempts = 0;
            recovering = false;
        }

        // A user-initiated stop or exit (remote STOP command, or back/exit with no menu open) must end
        // casting, not heal back into playback: flag it so the self-reconnect stays disabled, drop any
        // pending reconnect, then shut the receiver down so the cast session ends on the sender too.
        function stopCasting() {
            userStopped = true;
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
            stopPlayhead();
            context.stop();
        }

        // Continue-watching playhead reporting. lastOffset is in seconds; the backend rejects 0 and
        // there is no point resending the same second. Fire-and-forget; the backend allows CORS for
        // this origin, so a failed preflight or post must never affect playback.
        function reportPlayhead(offsetSec, force) {
            if (!playheadUrl || !Number.isFinite(offsetSec) || offsetSec <= 0) return;
            if (!force && offsetSec === playheadLastSent) return;
            // Skip a periodic report while a previous POST is still in flight, so a slow
            // backend cannot pile up overlapping requests. The terminal write passes
            // force to bypass both the de-dup and this guard.
            if (!force && playheadInflight) return;
            playheadLastSent = offsetSec;
            playheadInflight = true;
            const body = Object.assign({}, playheadPayload, { lastOffset: offsetSec });
            // Abort a hung POST before the next tick so a stuck socket is not leaked.
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), PLAYHEAD_INTERVAL - 1000);
            fetch(playheadUrl, {
                method: 'POST', headers: playheadHeaders,
                body: JSON.stringify(body), signal: controller.signal
            })
                .catch(e => console.warn('[Etincelle] playhead post failed', e))
                .finally(() => { clearTimeout(timer); playheadInflight = false; });
        }

        function stopPlayhead() {
            if (playheadTimer) {
                clearInterval(playheadTimer);
                playheadTimer = null;
            }
        }

        // Arm reporting from the LOAD customData. Needs the playhead url, its payload template and an
        // access token; without any of them it stays disabled (e.g. the Home Assistant integration).
        function setupPlayhead(customData) {
            stopPlayhead();
            playheadUrl = customData.playhead_url || null;
            playheadPayload = customData.playhead_payload || null;
            const token = customData.access_token;
            if (!playheadUrl || !playheadPayload || !token) {
                playheadUrl = null;
                return;
            }
            playheadHeaders = {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json',
                'X-Application-Id': 'molotov',
                'X-Client-Version': '5.51.0',
                'X-Os': 'android',
                'X-Preferred-Language': 'fr-FR'
            };
            if (customData.profile_id) playheadHeaders['X-Profile-Id'] = customData.profile_id;
            if (customData.user_id) playheadHeaders['X-User-Id'] = customData.user_id;
            playheadDurationSec = Math.floor(Number(playheadPayload.duration) || 0);
            playheadLastSent = -1;
            playheadTimer = setInterval(() => {
                if (playerManager.getPlayerState() === cast.framework.messages.PlayerState.PLAYING) {
                    reportPlayhead(Math.floor(playerManager.getCurrentTimeSec()));
                }
            }, PLAYHEAD_INTERVAL);
        }

        // Event Listeners
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            forceFrenchAudio();
            // Show the hint briefly, but only on the first load of the session.
            if (!hintShown) {
                hintShown = true;
                menuHint.classList.add('visible');
                clearTimeout(hideHintTimer);
                hideHintTimer = setTimeout(() => {
                    menuHint.classList.remove('visible');
                }, 5000);
            }
        });

        // Handle tracks appearing late
        playerManager.addEventListener(cast.framework.events.EventType.TRACKS_CHANGED, forceFrenchAudio);

        // A failure should not leave a black screen. Surface it and reload,
        // except when the error is just our own reload aborting the old load.
        playerManager.addEventListener(cast.framework.events.EventType.ERROR, event => {
            const code = event ? event.detailedErrorCode : null;
            console.error('[Etincelle] Playback error:', code, event);
            if (code === cast.framework.events.DetailedErrorCode.LOAD_INTERRUPTED) return;
            triggerReconnect();
        });

        // Clear the backoff once playback is actually running again.
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, recoveryDone);

        // When the item plays through to the end on the TV, mark it watched on the server.
        playerManager.addEventListener(cast.framework.events.EventType.MEDIA_FINISHED, event => {
            const reason = event && event.endedReason;
            const reasons = cast.framework.events.EndedReason;
            if (reason === reasons.END_OF_STREAM) {
                // Prefer the template duration, fall back to the player's duration, then
                // to the last reported position, so this terminal write still carries a
                // positive offset when no duration is known. Bypass the de-dup so an
                // identical last tick cannot drop it.
                const playerDur = Math.floor(playerManager.getDurationSec() || 0);
                const dur = playheadDurationSec > 0 ? playheadDurationSec
                    : (playerDur > 0 ? playerDur : Math.max(0, playheadLastSent));
                reportPlayhead(dur, true);
            } else if (reason === reasons.STOPPED) {
                // Playback was stopped (a STOP from the remote or a sender), as opposed to interrupted
                // by a new load: end casting rather than letting the self-reconnect restart it. This is
                // the reliable catch whichever way the remote's stop reaches the receiver.
                stopCasting();
            }
            // Do not stop the timer here: it self-gates on PLAYING, so a replay/restart in the same
            // session resumes reporting without a fresh LOAD. It is cleared on the next LOAD or on
            // sender disconnect.
        });

        // Stop the playhead timer when the last sender disconnects or the receiver shuts down; the
        // self-gating interval would otherwise keep ticking until the page is torn down.
        context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, stopPlayhead);
        context.addEventListener(cast.framework.system.EventType.SHUTDOWN, stopPlayhead);

        // Reload if the media clock freezes while playback should be advancing.
        setInterval(() => {
            if (recovering) {
                stalledFor = 0;
                return;
            }
            const messages = cast.framework.messages;
            const state = playerManager.getPlayerState();
            if (state !== messages.PlayerState.PLAYING
                && state !== messages.PlayerState.BUFFERING) {
                stalledFor = 0;
                return;
            }
            const t = playerManager.getCurrentTimeSec();
            // Any change in the media clock, forward or a backward seek, means
            // playback is not frozen. Only an unchanged clock is a real stall;
            // tracking the max instead would count a rewind as a stall.
            if (Number.isFinite(t) && t !== lastMediaTime) {
                lastMediaTime = t;
                stalledFor = 0;
                return;
            }
            stalledFor += STALL_CHECK_INTERVAL;
            if (stalledFor >= STALL_TIMEOUT) {
                console.warn('[Etincelle] Playback stalled; reloading');
                stalledFor = 0;
                triggerReconnect();
            }
        }, STALL_CHECK_INTERVAL);

        // Message Interceptors
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                // A malformed LOAD without media would throw below; hand it back
                // untouched (CAF rejects it) rather than aborting in the interceptor.
                if (!loadRequestData || !loadRequestData.media) return loadRequestData;
                // A new stream is loading; drop any pending seek so a stale
                // target cannot seek the incoming stream.
                cancelPendingSeek();
                // An auto-reconnect reloads the cached request, so it is the
                // same object reference; a genuine new cast is a fresh object.
                // Keep the manual audio choice across a reconnect, drop it for a
                // new stream so French is auto-selected again.
                const isReconnect = (loadRequestData === lastLoadRequest);
                if (!isReconnect) {
                    userSelectedAudio = false;
                    userAudioLanguage = null;
                    userAudioTrackId = null;
                    // A genuine new cast re-enables the self-reconnect after an earlier user stop.
                    userStopped = false;
                    // Drop any recovery still pending for the previous stream: cancel its
                    // armed reload (which would otherwise interrupt this new stream) and
                    // reset the backoff so this cast retries from the base delay.
                    recoveryDone();
                }
                // Reset the stall watchdog for the new stream.
                lastMediaTime = -1;
                stalledFor = 0;

                const media = loadRequestData.media;
                const customData = media.customData || {};

                if (customData.stream_url) media.contentId = customData.stream_url;
                if (customData.content_type) media.contentType = customData.content_type;

                // Drive continue-watching from the receiver (the phone may be away while casting).
                setupPlayhead(customData);

                const playbackConfig = Object.assign(
                    new cast.framework.PlaybackConfig(), playerManager.getPlaybackConfig());

                // Buffer tuning and the preferred audio language apply to every
                // stream, DRM-protected or not. The CAF property is shakaConfig;
                // retryParameters let transient network failures recover on
                // their own before they ever become fatal.
                const retryParameters = {
                    maxAttempts: 6,
                    baseDelay: 1000,
                    backoffFactor: 2,
                    timeout: 30000
                };
                playbackConfig.segmentRequestRetryLimit = 5;
                playbackConfig.shakaConfig = {
                    streaming: {
                        bufferingGoal: 30,
                        rebufferingGoal: 15,
                        bufferBehind: 30,
                        alwaysStreamText: true,
                        retryParameters
                    },
                    manifest: { retryParameters },
                    drm: { retryParameters },
                    // Restore a manual audio choice across an auto-reconnect,
                    // otherwise default to French.
                    preferredAudioLanguage:
                        (userSelectedAudio && userAudioLanguage) || 'fra'
                };

                // Clear any DRM settings carried over from the previous stream, so a
                // following clear stream is not treated as Widevine with stale
                // credentials. The block below re-sets them when the stream needs DRM.
                playbackConfig.protectionSystem = undefined;
                playbackConfig.licenseUrl = undefined;
                playbackConfig.licenseRequestHandler = undefined;
                playbackConfig.licenseHandler = undefined;

                if (customData.license_url && customData.drm_token) {
                    playbackConfig.protectionSystem = cast.framework.ContentProtection.WIDEVINE;

                    let licenseUrl = customData.license_url;
                    if (customData.asset_id) {
                        const separator = licenseUrl.includes('?') ? '&' : '?';
                        licenseUrl += separator + 'assetId='
                            + encodeURIComponent(customData.asset_id);
                    }
                    playbackConfig.licenseUrl = licenseUrl;

                    playbackConfig.licenseRequestHandler = requestInfo => {
                        requestInfo.withCredentials = true;
                        requestInfo.headers['x-dt-auth-token'] = customData.drm_token;
                    };

                    playbackConfig.licenseHandler = data => {
                        try {
                            const str = new TextDecoder().decode(data);
                            const json = JSON.parse(str);
                            if (json.license) {
                                const binaryString = atob(json.license);
                                const bytes = new Uint8Array(binaryString.length);
                                for (let i = 0; i < binaryString.length; i++) {
                                    bytes[i] = binaryString.charCodeAt(i);
                                }
                                return bytes;
                            }
                            console.warn('[Etincelle] License response has no .license field, passing raw data');
                        } catch (e) {
                            console.error('[Etincelle] License response parse failed:', e);
                        }
                        return data;
                    };
                }

                playerManager.setPlaybackConfig(playbackConfig);
                // Cache the resolved request so a later failure can reload it.
                lastLoadRequest = loadRequestData;
                return loadRequestData;
            }
        );

        // A STOP command (the remote's stop button, or a sender stop) ends casting: flag it so the
        // self-reconnect cannot heal playback back up, then tear the receiver down. The phone only
        // sends STOP when it is leaving this receiver, so this never fires on a normal channel change.
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.STOP,
            request => {
                stopCasting();
                return request;
            }
        );

        // Initialize
        initMenu();

        // Start Receiver
        const options = new cast.framework.CastReceiverOptions();
        options.supportedCommands = cast.framework.messages.Command.ALL_BASIC_COMMANDS |
                                    cast.framework.messages.Command.EDIT_TRACKS |
                                    cast.framework.messages.Command.SEEK;

        context.start(options);
    </script>
</body>
</html>
